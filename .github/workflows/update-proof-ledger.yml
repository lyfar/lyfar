name: Update proof ledger

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-proof-ledger
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Test generator
        run: |
          python -m compileall -q scripts tests
          python -m unittest discover -s tests -v

      - name: Refresh public ledger
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/generate_ledger.py

      - name: Check profile
        run: |
          python scripts/check_profile.py
          git diff --check

      - name: Detect generated changes
        id: changes
        run: |
          if git diff --quiet -- assets/proof-ledger-*.svg; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changed ledger
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/proof-ledger-*.svg
          git commit -m "chore: refresh proof ledger"
          git push
